name: Deploy to Ubuntu VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: find . -path ./node_modules -prune -o -name '*.js' -print0 | xargs -0 -n1 node --check

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: rental-shop-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$APP_ENV_FILE"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Package application
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            -czf "$RUNNER_TEMP/rental-shop.tar.gz" .

      - name: Prepare environment payload
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: printf '%s' "$APP_ENV_FILE" | base64 -w 0 > rental-shop.env.b64

      - name: Upload release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp "$RUNNER_TEMP/rental-shop.tar.gz" rental-shop.env.b64 \
            "${VPS_USER}@${VPS_HOST}:/tmp/"

      - name: Activate release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" \
            "RELEASE_ID='$RELEASE_ID' bash -s" <<'DEPLOY'
          set -euo pipefail

          app_root=/opt/rental-shop
          release_dir="$app_root/releases/$RELEASE_ID"

          mkdir -p "$release_dir" "$app_root/shared"
          tar -xzf /tmp/rental-shop.tar.gz -C "$release_dir"
          base64 -d /tmp/rental-shop.env.b64 > "$app_root/shared/.env"
          chmod 600 "$app_root/shared/.env"
          ln -sfn "$app_root/shared/.env" "$release_dir/.env"

          cd "$release_dir"
          npm ci --omit=dev
          node -e 'require("dotenv").config(); const uri = process.env.MONGODB_URI || ""; if (!/^mongodb(\+srv)?:\/\//.test(uri)) { console.error("MONGODB_URI must start with mongodb:// or mongodb+srv://"); process.exit(1); }'
          # PM2 reload keeps the previous release's cwd when the same app name
          # already exists. Recreate the process so it serves this release.
          pm2 delete rental-shop || true
          pm2 start ecosystem.config.js --env production
          pm2 save

          healthy=false
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent http://127.0.0.1:3000/health >/dev/null; then
              healthy=true
              break
            fi
            sleep 5
          done

          if [ "$healthy" != true ]; then
            pm2 logs rental-shop --lines 100 --nostream
            exit 1
          fi

          npm run migrate

          ln -sfn "$release_dir" "$app_root/current"
          rm -f /tmp/rental-shop.tar.gz /tmp/rental-shop.env.b64
          find "$app_root/releases" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +
          DEPLOY
